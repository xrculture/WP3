<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Neon Gradient -->
    <linearGradient id="neon-grad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00F0FF" />
      <stop offset="50%" stop-color="#7000FF" />
      <stop offset="100%" stop-color="#FF007A" />
    </linearGradient>
    
    <!-- Subtle Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Glowing/Vector Graphics Group -->
  <g filter="url(#glow)">
    <!-- Tracking Ring / Space Orbit -->
    <circle cx="256" cy="180" r="140" fill="none" stroke="url(#neon-grad)" stroke-width="4" stroke-dasharray="10 10" opacity="0.65" />
    <circle cx="256" cy="40" r="7" fill="url(#neon-grad)" />
    <circle cx="116" cy="180" r="7" fill="url(#neon-grad)" />
    <circle cx="396" cy="180" r="7" fill="url(#neon-grad)" />

    <!-- VR Headset Strap (Halo) -->
    <path d="M 166 170 C 116 170, 136 75, 256 75 C 376 75, 396 170, 346 170" fill="none" stroke="url(#neon-grad)" stroke-width="8" stroke-linecap="round" />

    <!-- VR Headset Visor -->
    <path d="M 166 170 A 30 30 0 0 1 196 135 L 316 135 A 30 30 0 0 1 346 170 L 346 205 A 20 20 0 0 1 326 225 L 296 225 Q 256 195 216 225 L 186 225 A 20 20 0 0 1 166 205 Z" fill="none" stroke="url(#neon-grad)" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" />
    
    <!-- Visor Accent Details -->
    <path d="M 196 170 L 316 170" fill="none" stroke="url(#neon-grad)" stroke-width="5" stroke-linecap="round" />
    <circle cx="256" cy="170" r="5" fill="url(#neon-grad)" />

    <!-- Greek Column Capital (Ionic Volutes) -->
    <!-- Left Scroll -->
    <circle cx="180" cy="290" r="24" fill="none" stroke="url(#neon-grad)" stroke-width="10" />
    <path d="M 180 302 A 12 12 0 1 1 192 290" fill="none" stroke="url(#neon-grad)" stroke-width="8" stroke-linecap="round" />
    
    <!-- Right Scroll -->
    <circle cx="332" cy="290" r="24" fill="none" stroke="url(#neon-grad)" stroke-width="10" />
    <path d="M 332 302 A 12 12 0 1 0 320 290" fill="none" stroke="url(#neon-grad)" stroke-width="8" stroke-linecap="round" />
    
    <!-- Capital Connector Bars -->
    <path d="M 180 266 L 332 266" fill="none" stroke="url(#neon-grad)" stroke-width="10" stroke-linecap="round" />
    <path d="M 204 290 L 308 290" fill="none" stroke="url(#neon-grad)" stroke-width="10" stroke-linecap="round" />

    <!-- Greek Column Shaft (Fluting) -->
    <line x1="206" y1="310" x2="206" y2="410" stroke="url(#neon-grad)" stroke-width="10" stroke-linecap="round" />
    <line x1="239" y1="310" x2="239" y2="410" stroke="url(#neon-grad)" stroke-width="10" stroke-linecap="round" />
    <line x1="273" y1="310" x2="273" y2="410" stroke="url(#neon-grad)" stroke-width="10" stroke-linecap="round" />
    <line x1="306" y1="310" x2="306" y2="410" stroke="url(#neon-grad)" stroke-width="10" stroke-linecap="round" />

    <!-- Greek Column Base (Pedestal steps) -->
    <path d="M 170 430 L 342 430" fill="none" stroke="url(#neon-grad)" stroke-width="12" stroke-linecap="round" />
    <path d="M 140 450 L 372 450" fill="none" stroke="url(#neon-grad)" stroke-width="12" stroke-linecap="round" />
  </g>
</svg>
