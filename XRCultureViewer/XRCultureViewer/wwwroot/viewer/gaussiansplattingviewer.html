<!DOCTYPE html>
<html>
<head>
    <title>Babylon.js - Load .splat file</title>
    <script src="https://cdn.babylonjs.com/babylon.js"></script>
    <script src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.min.js"></script>
    <script src="scripts/log.js"></script>
    <script src="scripts/load.js"></script>
    <style>
        body,
        #renderCanvas {
            width: 100%;
            height: 100%;
            margin: 0;
            overflow: hidden;
        }
    </style>
</head>
<body>
    <canvas id="renderCanvas"></canvas>
    <script>
        const canvas = document.getElementById("renderCanvas");
        const engine = new BABYLON.Engine(canvas, true);

        const createScene = async function () {
            const scene = new BABYLON.Scene(engine);

            // Camera
            const camera = new BABYLON.ArcRotateCamera(
                "camera",
                -Math.PI / 2,
                Math.PI / 3,
                10,
                BABYLON.Vector3.Zero(),
                scene
            );
            camera.attachControl(canvas, true);
            camera.minZ = 0.0001;
            camera.inertia = 0;
            camera.wheelPrecision = 250; // Default is 3

            const gs = new BABYLON.GaussianSplattingMesh("splat", null, scene);

            // Load the .splat file
            try {
                setTimeout(() => {
                    const urlParams = new URLSearchParams(window.location.search);
                    const modelId = urlParams.get('model');
                    const thumbnailMode = urlParams.get('thumbnail') === '1';
                    if (modelId) {
                        try {
                            window.logInfo(`Fetching modelId: ${modelId}`);

                            // Use fetch API to get the binary data
                            fetch('/Storage?handler=Model&id=' + encodeURIComponent(modelId), {
                                method: 'GET',
                                headers: {
                                    'Accept': 'application/octet-stream',
                                    'X-Requested-With': 'XMLHttpRequest'
                                }
                            }).then(response => {
                                if (!response.ok) {
                                    throw new Error('Network response was not ok: ' + response.status);
                                }

                                const contentType = response.headers.get('Content-Type');
                                window.logInfo(`Content-Type: ${contentType}`);

                                if (contentType && contentType.includes('text/html')) {
                                    throw new Error('Received HTML instead of binary data');
                                }

                                return response.arrayBuffer();
                            }).then(async function (data) {
                                window.logInfo(`Received data size: ${data.byteLength}`);

                                // Use a File - Babylon.js detects the .splat/.ply extension
                                const fileName = getFileNameWithExtension(modelId);
                                const file = new File([data], fileName, { type: 'application/octet-stream' });

                                window.logInfo(`Loading as File: ${fileName}`);

                                const result = await BABYLON.SceneLoader.ImportMeshAsync(
                                    "",
                                    "file:",
                                    file,
                                    scene
                                );

                                window.logInfo(`Loaded ${result.meshes.length} mesh(es)`);

                                // Find the actual GaussianSplattingMesh — index 0 may be a __root__ node
                                const loadedMesh = result.meshes.find(
                                    m => m instanceof BABYLON.GaussianSplattingMesh
                                ) ?? result.meshes[0];

                                if (loadedMesh) {
                                    window.logInfo(`Using mesh: ${loadedMesh.name} (${loadedMesh.constructor.name})`);

                                    loadedMesh.computeWorldMatrix(true);
                                    const boundingInfo = loadedMesh.getBoundingInfo();
                                    const boundingBox = boundingInfo.boundingBox;

                                    const center = boundingBox.centerWorld;
                                    const extents = boundingBox.extendSizeWorld;
                                    const modelSize = Math.max(extents.x, extents.y, extents.z);

                                    camera.target = center;
                                    camera.radius = modelSize * 3;
                                    camera.minZ = modelSize * 0.01;
                                    camera.maxZ = modelSize * 100;
                                    camera.wheelPrecision = 100 / modelSize;
                                } else {
                                    window.logErr("No mesh found in loaded result");
                                }

                                if (thumbnailMode) {
                                    // Wait for N rendered frames so the GPU has painted the splat
                                    let N = 5;
                                    let frameCount = 0;
                                    const observer = scene.onAfterRenderObservable.add(() => {
                                        if (++frameCount >= N) {
                                            scene.onAfterRenderObservable.remove(observer);
                                            window.parent.postMessage({ type: 'thumbnail-done', modelId: modelId }, '*');
                                        }
                                    });
                                }
                            }).catch(e => {
                                if (thumbnailMode) {
                                    window.parent.postMessage({ type: 'thumbnail-error', modelId: modelId }, '*');
                                }
                                window.logErr(e);
                            });
                        }
                        catch (e) {
                            if (thumbnailMode) {
                                window.parent.postMessage({ type: 'thumbnail-error', modelId: modelId }, '*');
                            }
                            window.logErr(e);
                        }
                    }
                }, 100);
            } catch (e) {
                window.logErr(e);
            }

            return scene;
        };

        createScene().then((scene) => {
            engine.runRenderLoop(() => scene.render());
        });

        window.addEventListener("resize", () => engine.resize());
    </script>
</body>
</html>
